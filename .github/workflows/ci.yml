name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Backend Typecheck
        run: npm --prefix backend run typecheck
      
      - name: Frontend Typecheck
        run: npm --prefix frontend run build
        
      - name: ESLint Backend (Non-blocking)
        continue-on-error: true
        run: npm --prefix backend run lint || npx --prefix backend eslint .
        
      - name: ESLint Frontend (Non-blocking)
        continue-on-error: true
        run: npm --prefix frontend run lint || npx --prefix frontend eslint .
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install AI Service dependencies
        working-directory: ./backend/ai_service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
          
      - name: Lint AI Service
        working-directory: ./backend/ai_service
        run: flake8 . --count --show-source --statistics

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm audit backend
        run: npm --prefix backend audit --audit-level=high || true
      - name: npm audit frontend
        run: npm --prefix frontend audit --audit-level=high || true
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/ai_service/requirements.txt || true

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Backend Tests
        run: npm --prefix backend test
      - name: Frontend Tests
        run: npm --prefix frontend test

  e2e-health-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: upstox_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/upstox_bot
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      UPSTOXBOT_ADMIN_TOKEN: ci-admin-token
      UPSTOXBOT_SECRET_KEY: ci-secret-key-12345678901234567890
      PORT: 5000
      API_URL: http://localhost:5000
      UPSTOX_API_KEY: ci_stub_key
      UPSTOX_API_SECRET: ci_stub_secret
      # Creating a fake JWT for the preflight check so it doesn't fail expiration checks
      UPSTOX_ACCESS_TOKEN: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjI1MzQwMjMwMDB9.invalid_signature

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      
      - name: Check for committed generated files
        run: |
          if [ -f "backend/NSE.json.gz" ] || [ -f "backend/complete.csv.gz" ]; then
            echo "Error: Generated data files should not be committed!"
            exit 1
          fi

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Apply DB Migrations
        working-directory: ./backend
        run: npm run db:push

      - name: Mock AI Service & Upstox Profile
        run: |
          cat << 'EOF' > mock-services.js
          const express = require('express');
          const app = express();
          app.get('/health', (req, res) => res.json({ status: 'ready', model_loaded: true }));
          app.listen(8001, () => console.log('Mock AI Service on 8001'));
          const upstox = express();
          upstox.get('/v2/user/profile', (req, res) => res.json({ data: { user_id: 'CI_USER' } }));
          upstox.listen(8002, () => console.log('Mock Upstox on 8002'));
          EOF
          npm i express
          node mock-services.js &
          echo "AI_SERVICE_URL=http://localhost:8001" >> $GITHUB_ENV
          
      - name: Start Backend Server
        working-directory: ./backend
        run: npm run dev &
        
      - name: Wait for Backend Server
        run: |
          echo "Waiting for backend on port 5000..."
          timeout 30s bash -c 'until curl -s http://localhost:5000/health; do sleep 1; done'

      - name: Run Preflight Check
        working-directory: ./backend
        run: npm run test:preflight

      - name: Start Frontend Server
        working-directory: ./frontend
        run: npm run dev &

      - name: Wait for Frontend Server
        run: |
          echo "Waiting for frontend on port 3000..."
          timeout 30s bash -c 'until curl -s http://localhost:3000; do sleep 1; done'

      - name: Run Playwright UI & E2E Tests
        working-directory: ./frontend
        run: npm run test:all
