server {
    listen 80;
    
    # Static SPA — serve from dist
    root /usr/share/nginx/html;
    index index.html;

    # Compress JS/CSS/JSON/SVG for static assets and proxied API responses
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types application/javascript text/css application/json image/svg+xml application/manifest+json;

    # Cache hashed assets permanently (all Vite output under /assets/ is content-hashed)
    location ^~ /assets/ {
        expires max;
        add_header Cache-Control "public, immutable";
    }
    
    # index.html — never cache (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # API proxy
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SECURITY: Overwrite (not append) X-Forwarded-For so the backend always
        # sees the real client IP from nginx, never a client-spoofed value.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
    
    # WebSocket proxy
    location /ws {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SECURITY: Overwrite (not append) X-Forwarded-For so the backend always
        # sees the real client IP from nginx, never a client-spoofed value.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;  # 1 hour — keep WS alive through market day
        proxy_send_timeout 3600s;
    }
    
    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
